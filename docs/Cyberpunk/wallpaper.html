<script src="js/index.js"></script>

<script>
    let resizeTimer;
    window.addEventListener('resize', () => {
        // 如果用户还在持续拖拽缩放，就清除上一次的定时器
        clearTimeout(resizeTimer);
        
        // 当用户停止拖拽 300 毫秒后，再执行刷新，保证丝滑
        resizeTimer = setTimeout(() => {
            window.location.reload();
        }, 300);
    });
</script>
