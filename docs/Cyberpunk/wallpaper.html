<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Some WebGL experiments with raindrop effects" />
	<link rel="stylesheet" type="text/css" href="css/normalize.css" />
	<link rel="stylesheet" type="text/css" href="css/demo.css" />
    <style>
		/* ⚡ 彻底根除闪烁：将原本动态加载的 main.jpg 直接作为 CSS 强固背景铺底 */
		html, body, .slideshow, .container {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: url('img/main.jpg') no-repeat center center;
			background-size: cover !important;
		}

		/* 锁死画布与图片尺寸 */
		#container, #myCanvas, #imgif, .img {
			position: absolute;
			top: 0;
			left: 0;
			width: 100% !important;
			height: 100% !important;
			object-fit: cover; 
		}
	</style>
</head>

<body class="demo-1">
	<div class="slideshow">
		<canvas id="container" style="position:absolute"></canvas>
		<div class="slide" id="main" data-weather="rain"></div>
		<nav class="slideshow__nav">				
			<a class="nav-item" href="#main"></a>			
		</nav>
	</div>
	
	<div class="container">		   
		<img class="img" id="imgif" alt="logo" src="img/main.jpg" />
		<canvas class="img" id='myCanvas'></canvas>			
		<p class="nosupport">Sorry, but your browser does not support WebGL!</p>
	</div>
			
	<script src="js/time.js"></script>
	<script src="js/index.js"></script>

	<script>
		let resizeTimer;
		window.addEventListener('resize', () => {
			clearTimeout(resizeTimer);
			resizeTimer = setTimeout(() => {
				window.location.reload();
			}, 300);
		});
	</script>
</body>
</html>
