<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Some WebGL experiments with raindrop effects" />
	<link rel="stylesheet" type="text/css" href="css/normalize.css" />
	<link rel="stylesheet" type="text/css" href="css/demo.css" />
    <style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background-color: #0a0a12; /* 确保绝对暗色底 */
		}

		.slideshow, .container {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw !important;
			height: 100vh !important;
			overflow: hidden;
		}

		/* ⚡ 终极修复：初始全部隐形，并延迟 200ms 淡入 */
		#container, #myCanvas, #imgif, .img {
			position: absolute;
			top: 0;
			left: 0;
			width: 100% !important;
			height: 100% !important;
			object-fit: cover; 
			
			opacity: 0; /* 初始隐形，防止图片未加载、Canvas未初始化时的白闪 */
			animation: rainWindowFadeIn 0.4s ease-in-out forwards;
			animation-delay: 0.2s; /* 核心：给 JS 运行和图片解码留出 200 毫秒的纯暗色缓冲期 */
		}

		@keyframes rainWindowFadeIn {
			to { opacity: 1; }
		}
	</style>
</head>

<body class="demo-1">
	<div class="slideshow">
		<canvas id="container"></canvas>
		<div class="slide" id="main" data-weather="rain"></div>
		<nav class="slideshow__nav">				
			<a class="nav-item" href="#main"></a>			
		</nav>
	</div>
	
	<div class="container">		   
		<img class="img" id="imgif" alt="logo" src="img/main.png" />
		<canvas class="img" id='myCanvas'></canvas>			
		<p class="nosupport">Sorry, but your browser does not support WebGL!</p>
	</div>
			
	<script src="js/time.js"></script>
	<script src="js/index.js"></script>

	<script>
		let resizeTimer;
		window.addEventListener('resize', () => {
			clearTimeout(resizeTimer);
			resizeTimer = setTimeout(() => {
				window.location.reload();
			}, 300);
		});
	</script>
</body>
</html>
