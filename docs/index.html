<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南式TOEIC鬼特訓 - Central Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="config.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&family=Noto+Sans+SC:wght=400;500;700&family=Noto+Sans+JP:wght=400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
            background-color: #FAF9F5;
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col antialiased">

    <header class="border-b border-[#EAE6D9] bg-[#FAF9F5]/90 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center text-white font-black text-lg shadow-md shadow-amber-500/20">
                    南
                </div>
                <div>
                    <h1 class="text-base font-bold text-slate-900 tracking-tight">南式TOEIC鬼特訓</h1>
                    <p class="text-[10px] text-amber-600 font-semibold tracking-wider uppercase">UNIT CONTROLLER</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <span class="text-xs font-mono text-slate-400 hidden sm:inline" id="global-counter-txt">Total: -- Units</span>
                <div class="text-xs font-bold text-amber-600 bg-amber-50 px-3 py-1.5 rounded-xl border border-amber-200/60 flex items-center space-x-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                    <span>群主持续更新中</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col gap-6">
        
        <section class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                <i data-lucide="search" class="w-4 h-4"></i>
            </div>
            <input 
                type="text" 
                id="searchConsoleInput" 
                oninput="filterToeicModules()" 
                placeholder="快速检索：输入单元编号或词义范围（如 '1'、'11-20'）直达目标特训..." 
                class="w-full pl-10 pr-4 py-3 bg-white rounded-xl border border border-[#EAE6D9] text-sm focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/10 placeholder-slate-400 transition-all shadow-sm"
            >
        </section>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3.5" id="modulesGridContainer">
            </div>

        <div id="search-empty-state" class="hidden text-center py-16 bg-white rounded-2xl border border-[#EAE6D9] border-dashed space-y-2">
            <div class="w-10 h-10 bg-slate-50 text-slate-400 rounded-full flex items-center justify-center mx-auto">
                <i data-lucide="alert-circle" class="w-5 h-5"></i>
            </div>
            <h4 class="text-xs font-bold text-slate-700">未找到相关特训单元</h4>
            <p class="text-[11px] text-slate-400">请尝试更换筛选关键字。</p>
        </div>

        <section class="p-4 bg-white rounded-2xl border border-[#EAE6D9] shadow-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
            <div class="flex items-center space-x-2 text-xs text-slate-500 font-medium">
                <i data-lucide="refresh-cw" class="w-3.5 h-3.5 text-slate-400 animate-spin" style="animation-duration: 8s;"></i>
                <span>群主持续更新中</span>
            </div>
            <div class="text-xs text-slate-600 font-medium flex flex-wrap items-center gap-1">
                <span>如果想要获取更多信息可以访问群主博客：</span>
                <a href="https://www.minami.ac.cn/" target="_blank" class="text-amber-600 font-bold hover:text-amber-700 hover:underline inline-flex items-center space-x-0.5">
                    <span>https://www.minami.ac.cn/</span>
                    <i data-lucide="external-link" class="w-3 h-3 inline"></i>
                </a>
            </div>
        </section>

    </main>

    <footer class="border-t border-[#EAE6D9] bg-[#FAF9F5] py-3 text-center text-[10px] text-slate-400 tracking-wide font-mono">
        Southern Ghost TOEIC Platform Engine • Powered by config.js URL Router
    </footer>

    <script>
        let localConfigRegistry = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof toeicModulesConfig === 'undefined') {
                console.error("Router Core Error: 'toeicModulesConfig' missing.");
                return;
            }
            localConfigRegistry = [...toeicModulesConfig];
            renderConsoleGrid(localConfigRegistry);
        });

        function renderConsoleGrid(modulesList) {
            const container = document.getElementById('modulesGridContainer');
            const emptyState = document.getElementById('search-empty-state');
            const counterText = document.getElementById('global-counter-txt');
            
            container.innerHTML = '';
            counterText.textContent = `Total: ${toeicModulesConfig.length} Units`;

            if (modulesList.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            modulesList.forEach(mod => {
                const cardAnchor = document.createElement('a');
                // 💡 关键改动：统一路由到唯一的 test.html，并通过 URL 附带对应的参数 ?unit=xxx
                cardAnchor.href = `test.html?unit=${mod.unit}`;
                cardAnchor.className = "bg-white p-3.5 rounded-xl border border-[#EAE6D9] shadow-sm hover:border-amber-500 hover:bg-amber-50/10 active:scale-[0.98] transition-all flex items-center justify-between group";
                
                cardAnchor.innerHTML = `
                    <div class="flex flex-col min-w-0 pr-2">
                        <span class="text-[9px] font-mono text-slate-400 font-bold uppercase tracking-wider">UNIT ${String(mod.id).padStart(2, '0')}</span>
                        <span class="text-xs font-bold text-slate-800 group-hover:text-amber-600 transition-colors truncate mt-0.5">${mod.title}</span>
                    </div>
                    <div class="w-6 h-6 rounded-lg bg-[#FAF9F5] group-hover:bg-amber-100 flex items-center justify-center shrink-0 transition-colors">
                        <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-slate-400 group-hover:text-amber-600 transform group-hover:translate-x-0.5 transition-all"></i>
                    </div>
                `;
                container.appendChild(cardAnchor);
            });

            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        function filterToeicModules() {
            const query = document.getElementById('searchConsoleInput').value.trim().toLowerCase();
            if (!query) {
                renderConsoleGrid(localConfigRegistry);
                return;
            }
            const filtered = localConfigRegistry.filter(mod => {
                return String(mod.id) === query || mod.title.toLowerCase().includes(query);
            });
            renderConsoleGrid(filtered);
        }
    </script>
</body>
</html>
