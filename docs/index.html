<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南式TOEIC鬼特訓 - Central Console</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;900&family=Noto+Sans+JP:wght=400;500;700&family=Noto+Sans+SC:wght=400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="config.js"></script>
    <script src="books.js"></script>

    <style>
        /* 采用与 test.html 100% 一致的温暖浅米色底 */
        html, body {
            background-color: #FAF9F5;
        }
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
        }

        /* 咖啡热气微动效 */
        @keyframes steam-rise {
            0% { transform: translateY(0) scale(0.9); opacity: 0; }
            50% { opacity: 0.3; transform: translateY(-6px) translateX(1px) scale(1.1); }
            100% { transform: translateY(-12px) scale(1.2); opacity: 0; }
        }
        .steam-particle { animation: steam-rise 3.5s infinite ease-in-out; }

        /* 提示贴签轻微呼吸效果 */
        @keyframes subtle-glow { 
            0%, 100% { transform: scale(1); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); } 
            50% { transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(217,119,6,0.08); } 
        }
        .pulse-accent { animation: subtle-glow 3.5s infinite ease-in-out; }

        /* 左侧特训单元专用隐藏式微距滚动条 */
        #modulesGridContainer::-webkit-scrollbar {
            width: 4px;
        }
        #modulesGridContainer::-webkit-scrollbar-track {
            background: #FAF9F5;
        }
        #modulesGridContainer::-webkit-scrollbar-thumb {
            background: #E6E1D3; 
            border-radius: 99px;
        }
        #modulesGridContainer::-webkit-scrollbar-thumb:hover {
            background: #D1C9B7; 
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col antialiased relative">

    <header class="border-b border-[#EAE6D9] bg-[#FAF9F5]/90 backdrop-blur-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-amber-500 flex items-center justify-center text-white font-black text-lg shadow-md shadow-amber-500/20">南</div>
                <div>
                    <h1 class="text-base font-bold text-slate-900 tracking-tight">南式TOEIC鬼特訓</h1>
                    <p class="text-[10px] text-amber-600 font-semibold tracking-wider uppercase">UNIT CONTROLLER</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <span class="text-xs font-mono text-slate-400 hidden sm:inline" id="global-counter-txt">Total: -- Units</span>
                <div class="text-xs font-bold text-amber-700 bg-amber-50 px-3 py-1.5 rounded-xl border border-amber-200 flex items-center space-x-1.5 shadow-sm">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span>
                    <span>群主持续更新中</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6 relative z-10">
        
        <div class="lg:col-span-6 flex flex-col gap-4">
            
            <section class="relative">
                <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </div>
                    <input 
                        type="text" 
                        id="searchConsoleInput" 
                        oninput="filterToeicModules()" 
                        placeholder="快速检索：输入单词序号直达单元..." 
                        class="w-full pl-11 pr-32 py-3 bg-white rounded-xl border border-[#E1DBC9] text-base text-slate-800 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/10 placeholder-slate-400 transition-all shadow-sm"
                    >
                    <div id="search-lock-badge" class="absolute right-3 flex items-center pointer-events-none transition-all duration-300 opacity-0 scale-75"></div>
                </div>
            </section>

            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3 max-h-[62vh] overflow-y-auto pr-1" id="modulesGridContainer"></div>

            <div id="search-empty-state" class="hidden text-center py-12 bg-white rounded-2xl border border-[#EAE6D9] border-dashed space-y-2 shadow-sm">
                <div class="w-10 h-10 bg-[#FAF9F5] text-slate-400 rounded-full flex items-center justify-center mx-auto">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i>
                </div>
                <h4 class="text-xs font-bold text-slate-700">未找到相关特训单元</h4>
                <p class="text-[11px] text-slate-400">该书籍中未检索到此序列单元。</p>
            </div>

            <section class="p-3.5 bg-white rounded-2xl border border-[#EAE6D9] shadow-sm flex flex-col gap-2">
                <div class="flex items-center space-x-2 text-xs text-slate-500 font-medium">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5 text-amber-500 animate-spin" style="animation-duration: 8s;"></i>
                    <span>群主持续更新中</span>
                </div>
                <div class="text-[11px] text-slate-500 leading-relaxed">
                    <span>更多信息访问博客：</span>
                    <a href="https://www.minami.ac.cn/" target="_blank" class="text-amber-600 font-bold hover:text-amber-700 hover:underline inline-flex items-center space-x-0.5">
                        <span>minami.ac.cn</span>
                        <i data-lucide="external-link" class="w-3 h-3 inline"></i>
                    </a>
                </div>
            </section>
            
        </div>

        <!-- 右侧课桌虚拟场景区：完美保留代码绘制的黑板、书架、台灯、咖啡杯 -->
        <div class="lg:col-span-6 hidden lg:flex flex-col justify-center items-center">
            <div class="w-full h-full min-h-[520px] bg-[#FAF7F0] rounded-3xl border border-[#EAE6D9] shadow-inner flex flex-col justify-between relative overflow-hidden p-6 group/desk">
                
                <!-- 顶部小书架 -->
                <div class="w-full h-2.5 bg-[#C4BAA0] rounded shadow-sm border-b border-black/5 pointer-events-none mt-2 relative z-0 flex items-end px-4 pb-0.5 space-x-1">
                    <div class="w-2.5 h-7 bg-rose-400 rounded-t shadow-xs"></div>
                    <div class="w-3 h-8 bg-amber-400 rounded-t shadow-xs"></div>
                    <div class="w-2 h-7.5 bg-emerald-500 rounded-t shadow-xs transform rotate-6 origin-bottom"></div>
                    
                    <div class="absolute right-8 bottom-0.5 flex flex-col items-center">
                        <div class="flex space-x-0.5 -mb-0.5">
                            <div class="w-1.5 h-3 bg-emerald-400 rounded-full rotate-12 origin-bottom"></div>
                            <div class="w-1.5 h-3.5 bg-emerald-300 rounded-full"></div>
                        </div>
                        <div class="w-4 h-2 bg-stone-300 rounded-b shadow-xs"></div>
                    </div>
                </div>

                <!-- 墙上台灯 -->
                <div class="absolute top-24 left-4 z-10 flex flex-col items-center pointer-events-none">
                    <div class="w-11 h-6 bg-slate-700 rounded-t-full shadow-sm"></div>
                    <div class="w-0.5 h-14 bg-slate-400 -mt-0.5"></div>
                    <div class="w-6 h-1 bg-slate-500 rounded-full shadow -mt-0.5"></div>
                    <div class="absolute top-4 left-2 w-64 h-64 bg-amber-400/10 pointer-events-none blur-xl rounded-full"></div>
                </div>

                <!-- 核心大黑板：已将原本占据左侧的“笔记本电脑”剔除，整体排版更加开阔协调 -->
                <div class="w-full h-64 bg-[#EADFC9] rounded-2xl border-t-4 border-[#C8BAA5] p-4 flex flex-col justify-between relative z-20 shadow-sm mt-auto mb-4">
                    
                    <!-- 黑板深色内衬 -->
                    <div class="absolute inset-2.5 bg-[#232B35] rounded-xl opacity-95 pointer-events-none z-0">
                        <div class="w-[98.5%] h-[92%] border border-slate-700/20 rounded-lg border-dashed m-auto mt-[1.5%]"></div>
                    </div>

                    <!-- 黑板面内部元素 -->
                    <div class="w-full h-full flex flex-col justify-between relative z-10 p-1">
                        
                        <!-- 顶部精致的板书粉笔字标题感 -->
                        <div class="flex justify-between items-center text-[9px] font-mono tracking-wider text-slate-500/80">
                            <span>⚡ STATUS: ACTIVE</span>
                            <span>GHOST GONG-XUN BOARD</span>
                        </div>

                        <!-- 提示文案：笔记本电脑去掉后，此处文本在黑板中央居中放大显示，非常和谐 -->
                        <div class="flex-1 flex flex-col justify-center items-center text-center px-6">
                            <p class="text-sm sm:text-base font-bold tracking-wide text-amber-100/90 leading-loose pulse-accent">
                                💡 特训提示：<br>
                                把要学习的书放到桌面上，<br>
                                就可以开始魔鬼特训啦！
                            </p>
                        </div>

                        <!-- 右下角保留的热咖啡杯：完美贴合黑板底部边框边缘 -->
                        <div class="flex justify-end items-end pr-2">
                            <div class="flex flex-col items-center shrink-0 relative">
                                <div class="absolute -top-3.5 flex space-x-0.5">
                                    <div class="w-0.5 h-2.5 bg-white/30 rounded-full blur-[0.5px] steam-particle"></div>
                                </div>
                                <div class="w-5.5 h-6.5 bg-gradient-to-r from-amber-700 to-amber-900 rounded-b-md relative shadow-sm">
                                    <div class="absolute top-1 -right-1 w-1 h-3 border border-amber-800 rounded-r-full border-l-transparent"></div>
                                </div>
                                <div class="w-7 h-0.5 bg-[#b45309] rounded-full shadow mt-0.5"></div>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- 桌面随手记输入框 -->
                <div class="w-full bg-white/95 border border-[#E1DBC9] rounded-xl p-3 shadow-inner space-y-1 relative z-10">
                    <div class="flex items-center space-x-1.5 text-xs font-bold text-amber-900">
                        <i data-lucide="bookmark" class="w-4 h-4 text-amber-600"></i>
                        <span class="font-mono uppercase tracking-wider text-[10px]">进度随手记 (STUDY BOOKMARK)</span>
                    </div>
                    <input 
                        type="text" 
                        id="deskBookmarkInput" 
                        placeholder="键入记录当前复习到哪了，退出前自动长效保存..." 
                        class="w-full bg-[#FAF9F5] border border-[#E1DBC9] rounded-lg px-3 py-1.5 text-sm font-bold text-slate-800 focus:outline-none focus:border-amber-500 shadow-inner transition-all"
                    >
                </div>

            </div>
        </div>
        
    </main>

    <footer class="border-t border-[#EAE6D9] bg-[#F3EFE3]/30 py-3 text-center text-[10px] text-slate-400 tracking-wide font-mono relative z-10">
        Southern Ghost TOEIC Platform Engine • Powered by config.js URL Router
    </footer>

    <script>
        // 🔒 原有核心检索过滤、业务数据格栅处理及联动算法逻辑，100% 完整无损原封未动
        let localConfigRegistry = [];
        let currentBookFilter = 'all'; 

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof toeicModulesConfig === 'undefined') {
                console.error("Router Core Error: 'toeicModulesConfig' missing.");
                return;
            }
            localConfigRegistry = [...toeicModulesConfig];
            renderConsoleGrid(localConfigRegistry);

            // 🔖 智能随手记电子书签长效持久化同步加载与事件监听
            const bookmarkInput = document.getElementById('deskBookmarkInput');
            if (bookmarkInput) {
                bookmarkInput.value = localStorage.getItem('toeic_study_bookmark') || '';
                bookmarkInput.addEventListener('input', (e) => {
                    localStorage.setItem('toeic_study_bookmark', e.target.value);
                });
            }
        });

        function renderConsoleGrid(modulesList) {
            const container = document.getElementById('modulesGridContainer');
            const emptyState = document.getElementById('search-empty-state');
            const counterText = document.getElementById('global-counter-txt');
            
            if (!container) return;
            container.innerHTML = '';
            counterText.textContent = `Total: ${modulesList.length} Units`;

            if (modulesList.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            modulesList.forEach(mod => {
                const cardAnchor = document.createElement('a');
                cardAnchor.href = `test.html?unit=${encodeURIComponent(mod.unit)}`;
                
                const bookMeta = (typeof my3DBooksDataset !== 'undefined') 
                    ? my3DBooksDataset.find(b => b.bookId === mod.book) 
                    : null;

                const themeClass = bookMeta?.cardTheme || "border-[#EAE6D9] bg-white hover:border-amber-400 hover:shadow-md";
                const dotColor = bookMeta?.dotColor || "bg-slate-400 shadow-slate-400/50";

                cardAnchor.className = `${themeClass} p-3 sm:p-4 rounded-xl border shadow-sm active:scale-[0.98] transition-all flex items-center justify-between group cursor-pointer`;
                
                // ⚡ 左侧字体大字号化暴增
                cardAnchor.innerHTML = `
                    <div class="flex flex-col min-w-0 pr-1 py-0.5">
                        <div class="flex items-center space-x-1.5">
                            <span class="text-xs font-mono text-slate-400 font-bold uppercase tracking-wider">UNIT ${String(mod.id).padStart(2, '0')}</span>
                            <span class="w-1.5 h-1.5 rounded-full ${dotColor} shadow-sm"></span>
                        </div>
                        <span class="text-base font-black text-slate-700 group-hover:text-amber-600 transition-colors truncate mt-1 tracking-tight">${mod.title}</span>
                    </div>
                    <div class="w-6 h-6 rounded-md bg-[#F3EFE3] group-hover:bg-amber-50 flex items-center justify-center shrink-0 transition-colors">
                        <i data-lucide="chevron-right" class="w-3.5 h-3.5 text-slate-400 group-hover:text-amber-600 transform group-hover:translate-x-0.5 transition-all"></i>
                    </div>
                `;
                container.appendChild(cardAnchor);
            });

            if (typeof lucide !== 'undefined') { lucide.createIcons(); }
        }

        function filterToeicModules() {
            const query = document.getElementById('searchConsoleInput').value.trim();
            
            const filtered = localConfigRegistry.filter(mod => {
                if (currentBookFilter !== 'all' && mod.book !== currentBookFilter) {
                    return false;
                }
                
                if (!query) return true;
                
                if (/^\d+$/.test(query) && mod.unit.includes('-')) {
                    const targetNum = parseInt(query, 10);
                    const rangeParts = mod.unit.split('-');
                    
                    const start = parseInt(rangeParts[0].replace(/\D/g, ''), 10);
                    const end = parseInt(rangeParts[1].replace(/\D/g, ''), 10);
                    
                    return targetNum >= start && targetNum <= end;
                }
                
                return mod.title.includes(query) || mod.unit.includes(query);
            });
            
            renderConsoleGrid(filtered);
        }

        window.setBookFilter = function(bookId) {
            currentBookFilter = bookId;
            
            const badge = document.getElementById('search-lock-badge');
            const inputEl = document.getElementById('searchConsoleInput');
            
            const dataset = (typeof my3DBooksDataset !== 'undefined') ? my3DBooksDataset : [];
            const bookMeta = dataset.find(b => b.bookId === bookId);
            
            if (bookMeta) {
                badge.innerHTML = `<span class="text-[10px] font-black px-2 py-0.5 rounded-md ${bookMeta.lockBadgeStyle}">🔒 SCOPE: ${bookMeta.scopeCode}</span>`;
                badge.classList.remove('opacity-0', 'scale-75');
                badge.classList.add('opacity-100', 'scale-100');
                inputEl.placeholder = "已锁定区间范围 | 输入要定位的序号...";
            }
            
            filterToeicModules();
        };

        document.addEventListener('dblclick', (e) => {
            if (!e.target.closest('.book-3d-space')) {
                currentBookFilter = 'all';
                document.getElementById('searchConsoleInput').value = ''; 
                
                const badge = document.getElementById('search-lock-badge');
                const inputEl = document.getElementById('searchConsoleInput');
                badge.classList.remove('opacity-100', 'scale-100');
                badge.classList.add('opacity-0', 'scale-75');
                inputEl.placeholder = "快速检索：输入单词序号（如 '13'）直达目标单元...";
                
                filterToeicModules();
                if (typeof window.resetBookVisuals === 'function') { window.resetBookVisuals(); }
            }
        });
    </script>
</body>
</html>
